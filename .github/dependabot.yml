version: 2
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    ignore:
      - dependency-name: chardet
    groups:
      python-packages:
        patterns:
          - '*'
    cooldown:
      default-days: 7
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns:
          - '*'
    cooldown:
      default-days: 7
