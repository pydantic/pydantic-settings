version: 2
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    ignore:
      - dependency-name: chardet
    groups:
      python-packages:
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
